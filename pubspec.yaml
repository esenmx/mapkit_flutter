name: mapkit_flutter
description: MapKit for Flutter. Display MKMapView on iOS and macOS with annotations, overlays, clustering, look-around, tile overlays, and modern MapKit configurations.
version: 0.3.1
homepage: https://github.com/esenmx/mapkit_flutter
repository: https://github.com/esenmx/mapkit_flutter
issue_tracker: https://github.com/esenmx/mapkit_flutter/issues
topics:
  - maps
  - ios
  - macos
  - apple
  - mapkit

environment:
  sdk: ^3.10.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0

dev_dependencies:
  checks: ^0.3.1
  flutter_test:
    sdk: flutter
  pigeon: ^27.1.0
  very_good_analysis: ^10.2.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: MapKitPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: MapKitPlugin
        sharedDarwinSource: true
