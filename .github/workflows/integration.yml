name: Integration

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  integration:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: cd example && flutter pub get
      - name: Start iOS simulator
        run: xcrun simctl boot 'iPhone 16' || true
      - run: cd example && flutter test integration_test/ -d "iPhone 16"
